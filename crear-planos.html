<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Planos</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='css/styles.css'>
    <link rel="icon" type="image/png" href="images/arquitecto.png">
</head>

<body>
    <header class="header">
        <h1>WHERE ARE MY KEYS ?</h1>
        <h4>Menos tiempo buscando, más tiempo viviendo</h4>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="crear-planos.html" class="active">Crear planos</a></li>
            <li><a href="index.html">Localizador</a></li>
            <li><a href="emergencia.html">Emergencia</a></li>
        </ul>
    </nav>

    <main class="container-cards">
        <div class="card-form">
            <h2>Registrar nueva vivienda</h2>

            <form action="crear-planos.html" method="post">
                <div class="form-group">
                    <label class="form-label" for="name"> Nombre propiedad</label>
                    <input class="form-input" type="text" id="name" placeholder="Tu nombre" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="reason-input">Tipo de propiedad </label>
                    <input class="form-input" list="reasons-list" id="reason-input"
                        placeholder="Haz clic para ver opciones...">

                    <datalist class="form-datalist" id="reasons-list">
                        <option value="Piso">
                        <option value="Chalet">
                        <option value="Oficina">
                        <option value="Trastero">
                    </datalist>
                </div>
                <div class="form-row" style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label" for="meters">Altura Techo (m)</label>
                        <input class="form-input" type="number" id="meters" step="0.1" placeholder="2.5">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label" for="plants">Nº de Plantas</label>
                        <input class="form-input" type="number" id="plants" value="1">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="photo">Subir plano</label>
                    <input class="form-file" type="file" id="photo" name="photo" accept="image/*">
                </div>
                <div class="form-group">
                    <button class='form-button' type="submit">Generar planos</button>
                </div>
            </form>
        </div>

    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 Where Are My Keys? - Menos tiempo buscando.</p>
            <div class="footer-links">
                <a href="#">Privacidad</a>
                <a href="#">Soporte</a>
                <a href="mailto:info@wherekeys.com">Contacto</a>
            </div>
        </div>
    </footer>

</body>

</html>
